<h1>Cart</h1>

<div id="c"></div>

<button onclick="go()">Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart"))||[];
let t=0;

cart.forEach(i=>{
  t+=i.price;
  c.innerHTML+=`<p>${i.name} $${i.price}</p>`;
});

c.innerHTML+=`<h3>Total $${t}</h3>`;

function go(){location.href="checkout.html"}
</script>
