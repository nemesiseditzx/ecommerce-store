<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f9fafb;
    }

    input, select {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
    }

    button {
      background: #2563EB;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Checkout</h1>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<!-- ✅ ONLY ONE TYPE SELECT -->
<select id="type" onchange="togglePayment()">
  <option value="delivery">Delivery</option>
  <option value="pickup">Store Pickup</option>
</select>

<input id="address" placeholder="Address (for delivery only)">

<!-- ✅ Payment only for pickup -->
<div id="paymentBox" style="display:none;">
  <select id="payment">
    <option value="cash">Pay at Store</option>
    <option value="stripe">Online Payment</option>
  </select>
</div>

<button onclick="placeOrder()">Place Order</button>

<script>
const API = "https://ecommerce-store-production-cca7.up.railway.app";

function togglePayment() {
  const type = document.getElementById("type").value;
  const paymentBox = document.getElementById("paymentBox");

  if (type === "pickup") {
    paymentBox.style.display = "block";
  } else {
    paymentBox.style.display = "none";
  }
}

function placeOrder() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let type = document.getElementById("type").value;

  // ✅ FIXED PAYMENT LOGIC
  let paymentMethod = "none";

  if (type === "pickup") {
    paymentMethod = document.getElementById("payment").value;
  }

  let order = {
    id: 0,
    customer_name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    address: document.getElementById("address").value,
    items: cart,
    total: cart.reduce((sum, i) => sum + i.price, 0),
    order_type: type,
    payment_method: paymentMethod,
    payment_status: "",
    order_status: ""
  };

  fetch(API + "/orders", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(order)
  })
  .then(res => res.json())
  .then(data => {
    alert("Order placed! ID: " + data.order_id);
    localStorage.removeItem("cart");
  });
}
</script>

</body>
</html>
