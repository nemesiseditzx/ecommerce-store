<h1>🛍️ My Store</h1>

<a href="cart.html">🛒 Cart</a> |
<a href="track.html">📦 Track</a>

<div id="products"></div>

<script>
const API = "https://your-railway-url";

async function load(){
  let r = await fetch(API+"/products");
  let d = await r.json();

  d.forEach(p=>{
    products.innerHTML += `
      <div>
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="add('${p.name}',${p.price})">Add</button>
      </div>
    `;
  });
}

function add(n,p){
  let c = JSON.parse(localStorage.getItem("cart"))||[];
  c.push({name:n,price:p});
  localStorage.setItem("cart",JSON.stringify(c));
  alert("Added");
}

load();
</script>
