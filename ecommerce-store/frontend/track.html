<h1>Admin</h1>

<div id="o"></div>

<script>
const API="https://your-railway-url";

async function load(){
  let r=await fetch(API+"/orders");
  let d=await r.json();

  d.forEach(x=>{
    o.innerHTML+=`
      <div>
        <p>ID ${x.id}</p>
        <p>${x.order_status}</p>
        <button onclick="u(${x.id})">Ship</button>
      </div>
    `;
  });
}

function u(id){
  fetch(API+"/orders/"+id+"?status=shipped",{method:"PUT"})
  .then(()=>alert("updated"));
}

load();
</script>
